services:
  - type: web
    name: spending-tracker-backend
    env: python
    buildCommand: "pip install poetry && poetry install --no-dev"
    startCommand: "poetry run uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_ENV
        value: production
      - key: PLAID_REDIRECT_URI_PROD
        sync: false
      - key: AUTH_USERNAME
        sync: false
      - key: AUTH_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: "3.13"
    disk:
      name: spending-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1
