app = "spending-tracker-backend"
primary_region = "sjc"

[build]

[env]
  PLAID_ENV = "production"
  PYTHON_VERSION = "3.13"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "get"
    path = "/health"

[mounts]
  source = "spending_data"
  destination = "/app"
  initial_size = "1gb"
