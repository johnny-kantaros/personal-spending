# fly.toml app configuration file generated for spending-tracker-backend on 2026-04-17T20:54:56-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'spending-tracker-backend'
primary_region = 'sjc'

[build]
  dockerfile = "Dockerfile"

[env]
  PLAID_ENV = 'production'
  PYTHON_VERSION = '3.13'
  JWT_SECRET_KEY = 'FastHerdFoldLump2!'

[[mounts]]
  source = 'spending_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '5s'
    method = 'get'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
